name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up PDM
        uses: pdm-project/setup-pdm@v4
        with:
          version: 2.26.8

      - name: Install test and lint dependencies
        run: pdm sync -G test -G lint

      - name: Run Ruff
        run: pdm run ruff check src tests

      - name: Run pytest
        run: pdm run pytest

      - name: Build package
        run: pdm build

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: reports/
          if-no-files-found: ignore
