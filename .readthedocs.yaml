---
# .readthedocs.yaml
version: 2
build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  jobs:
    post_create_environment:
      - python -m pip install --upgrade pip
      - python -m pip install "pdm==2.26.8"
    install:
      - pdm config use_uv true
      - pdm config python.use_venv true
      - pdm sync -G docs
mkdocs:
  configuration: mkdocs.yml
