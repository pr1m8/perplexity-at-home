site_name: perplexity-at-home
site_description: LangGraph-powered research agents with optional Postgres persistence.
site_url: https://perplexity-at-home.readthedocs.io/
repo_url: https://github.com/pr1m8/perplexity-at-home
repo_name: pr1m8/perplexity-at-home
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.tracking
    - content.code.copy
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: teal
      accent: amber

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            separate_signature: true
            show_root_heading: true
            show_root_full_path: false
            show_source: false

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js

nav:
  - Overview: index.md
  - Getting Started: getting-started.md
  - Architecture: architecture.md
  - Reference:
      - CLI: reference/cli.md
      - Settings: reference/settings.md
      - Persistence: reference/persistence.md
      - Deep Research Runtime: reference/deep-research.md
      - Search Workflows: reference/search-workflows.md
