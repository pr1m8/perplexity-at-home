# Composite self-referential extras have been removed. They are redundant for
# `pdm install -G :all` and make PDM resolve the project through nested extras
# again, which significantly increases solver churn without adding new packages.

[tool.ruff]
target-version = "py313"
line-length = 100
src = ["src"]
extend-exclude = [
    ".venv",
    ".nox",
    ".pytest_cache",
    "build",
    "dist",
    "data",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM", "C4", "RUF"]
ignore = ["E501"]

[tool.ruff.lint.isort]
known-first-party = ["perplexity_at_home"]
combine-as-imports = true
force-sort-within-sections = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pyright]
include = ["src"]
exclude = [".venv", "build", "dist", ".nox", ".pytest_cache"]
pythonVersion = "3.13"
typeCheckingMode = "strict"
reportMissingTypeStubs = "warning"

[tool.mypy]
python_version = "3.13"
strict = true
show_error_codes = true
warn_unused_configs = true
pretty = true

[[tool.mypy.overrides]]
module = [
    "langchain.*",
    "langgraph.*",
    "chromadb.*",
    "qdrant_client.*",
    "weaviate.*",
    "neo4j.*",
    "playwright.*",
    "scrapy.*",
]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = [
    "-vv",
    "--color=yes",
    "--code-highlight=yes",
    "--showlocals",
    "--instafail",
    "--cov=perplexity_at_home",
    "--cov-report=term-missing:skip-covered",
    "--cov-report=xml:reports/coverage.xml",
    "--cov-report=html:reports/htmlcov",
    "--junitxml=reports/junit.xml",
    "--html-output=reports/report_output",
    "--should-open-report=never",
    "--capture-screenshots=failed",
]
xfail_strict = true

[tool.coverage.run]
branch = true
source = ["perplexity_at_home"]
parallel = true

[tool.coverage.report]
fail_under = 85
skip_covered = true
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]

[tool.coverage.html]
directory = "reports/htmlcov"

[tool.coverage.xml]
output = "reports/coverage.xml"

[tool.interrogate]
fail-under = 85
verbose = 1
color = true
exclude = ["tests", "docs", "build", "dist", ".venv", ".nox"]

[tool.bandit]
exclude_dirs = ["tests", "docs", "build", "dist", ".venv", ".nox"]
skips = ["B101"]

[tool.commitizen]
name = "cz_conventional_commits"
tag_format = "v$version"
version_scheme = "pep440"
version_provider = "pep621"
update_changelog_on_bump = true
major_version_zero = true

[tool.towncrier]
package_dir = "."
directory = "changes"
filename = "RELEASE_NOTES.md"
start_string = "<!-- towncrier release notes start -->\n"
title_format = "## {version} - {project_date}"
issue_format = "[#{issue}](https://github.com/pr1m8/perplexity-at-home/issues/{issue})"
template = "default"
underlines = ["", "", ""]
all_bullets = false
ignore = ["README.md", ".gitkeep"]

[[tool.towncrier.type]]
directory = "feature"
name = "🚀 Features"
showcontent = true

[[tool.towncrier.type]]
directory = "bugfix"
name = "🐛 Bug Fixes"
showcontent = true

[[tool.towncrier.type]]
directory = "improvement"
name = "✨ Improvements"
showcontent = true

[[tool.towncrier.type]]
directory = "deprecation"
name = "🗑️ Deprecations"
showcontent = true

[[tool.towncrier.type]]
directory = "breaking"
name = "💥 Breaking Changes"
showcontent = true

[[tool.towncrier.type]]
directory = "security"
name = "🔒 Security"
showcontent = true

[[tool.towncrier.type]]
directory = "performance"
name = "⚡ Performance"
showcontent = true

[[tool.towncrier.type]]
directory = "docs"
name = "📚 Documentation"
showcontent = true

[[tool.towncrier.type]]
directory = "dev"
name = "🔧 Development"
showcontent = true

[[tool.towncrier.type]]
directory = "misc"
name = "🔀 Miscellaneous"
showcontent = true

[tool.pdm]
distribution = true

[tool.pdm.resolution.overrides]
# Guard against a PDM 2.26.7 resolver bug on Python 3.13 by pinning the
# transitive candidates that otherwise send `pdm install -G :all` down broken
# metadata paths.
greenlet = "==3.4.0"
httptools = "==0.7.1"
"python-dotenv" = "==1.2.2"
pyyaml = "==6.0.3"
uvloop = "==0.22.1"
watchfiles = "==1.1.1"
websockets = "==16.0"

[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"
