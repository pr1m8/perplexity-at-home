[project]
name = "perplexity-at-home"
version = "0.1.0"
description = "Perplexity-style local research agents built with LangGraph and Tavily"
readme = "README.md"
requires-python = ">=3.13,<3.14"
dependencies = [
    "requests>=2.32.5",
    "urllib3>=2.6.3",
    "charset-normalizer>=3.4.4",
    "neo4j>=6.1.0",
    "alembic>=1.18.4",
    "pydantic>=2.12.5",
    "pydantic-settings>=2.13.1",
    "sqlalchemy[asyncio]>=2.0.49",
    "fastapi>=0.135.3",
    "uvicorn[standard]>=0.44.0",
    "sse-starlette>=3.3.4",
    "pyrate-limiter>=4.1.0",
    "tenacity>=9.1.4",
    "psycopg[binary,pool]",
    "opentelemetry-api>=1.40.0",
    "opentelemetry-sdk>=1.40.0",
    "opentelemetry-exporter-otlp>=1.40.0",
    "opentelemetry-instrumentation>=0.61b0",
    "opentelemetry-instrumentation-fastapi>=0.61b0",
    "opentelemetry-instrumentation-sqlalchemy>=0.61b0",
    "opentelemetry-instrumentation-psycopg>=0.61b0",
    "opentelemetry-instrumentation-logging>=0.61b0",
    "prometheus-client>=0.24.1",
    "temporalio[opentelemetry]>=1.24.0",
    "minio>=7.2.20",
    "fastmcp==3.0.2",
    "langchain>=1.2.15",
    "unstructured>=0.21.5",
]

[[project.authors]]
name = "Will"
email = "you@example.com"

[project.license]
text = "MIT"

[project.urls]
Homepage = "https://github.com/pr1m8/perplexity-at-home"
Repository = "https://github.com/pr1m8/perplexity-at-home"
Issues = "https://github.com/pr1m8/perplexity-at-home/issues"
Documentation = "https://perplexity-at-home.readthedocs.io/"

[project.scripts]
perplexity-at-home = "perplexity_at_home.cli:main"

